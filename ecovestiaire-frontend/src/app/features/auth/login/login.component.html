<div class="min-h-screen w-full bg-white flex flex-col lg:flex-row overflow-hidden">
  
  <!-- LEFT PANEL: BRANDING -->
  <div class="lg:w-1/2 bg-balawi-bg relative flex flex-col justify-center p-8 lg:p-16 overflow-hidden border-b-[8px] lg:border-b-0 lg:border-r-[8px] border-balawi-bg">
    <!-- Background Texture/Shapes -->
    <div class="absolute top-0 right-0 w-48 h-48 bg-balawi-neon -rotate-12 translate-x-24 -translate-y-24"></div>
    <div class="absolute bottom-0 left-0 w-64 h-64 border-[15px] border-balawi-neon/10 rounded-full -translate-x-32 translate-y-32"></div>
    
    <div class="relative z-10 space-y-6">
      <h1 class="text-6xl md:text-8xl font-heading text-white uppercase leading-[0.8] tracking-tighter italic">
        BALAWI <br>
        <span class="text-balawi-neon">EXPERIENCE</span>
      </h1>
      <p class="font-slogan text-white/50 text-base uppercase tracking-widest max-w-sm">
        MODE CIRCULAIRE & STYLE BRUTALISTE.
      </p>
    </div>

    <!-- Back Link -->
    <div class="absolute top-6 left-6">
      <a routerLink="/" class="flex items-center gap-2 text-balawi-neon font-heading text-xs uppercase tracking-widest hover:text-white transition-colors group">
        <mat-icon class="!text-sm transition-transform group-hover:-translate-x-1">arrow_back</mat-icon>
        RETOUR
      </a>
    </div>
  </div>

  <!-- RIGHT PANEL: FORM -->
  <div class="lg:w-1/2 flex items-center justify-center p-6 lg:p-12 relative bg-white" @fadeSlide>
    <div class="w-full max-w-sm">
      
      <div class="mb-8">
        <h2 class="text-4xl font-heading text-balawi-bg uppercase tracking-tight italic mb-1">CONNEXION</h2>
        <div class="w-16 h-1.5 bg-balawi-neon"></div>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <!-- Error Message -->
        <div *ngIf="errorMessage" class="bg-red-500 text-white p-3 border-[3px] border-balawi-bg font-heading text-[10px] uppercase tracking-widest shadow-[4px_4px_0px_0px_#0B0B0B]">
          {{ errorMessage }}
        </div>

        <!-- Email Field -->
        <div class="space-y-2">
          <label class="font-heading text-[10px] text-balawi-bg uppercase tracking-widest">EMAIL</label>
          <div class="relative">
            <input type="email" formControlName="email" placeholder="EX: ANAS@BALAWI.MA"
                   class="w-full px-5 py-3.5 border-[3px] border-balawi-bg font-heading text-xs uppercase tracking-tight focus:bg-balawi-neon/10 outline-none transition-all placeholder:text-balawi-bg/20">
            <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-balawi-bg/20 !flex !items-center !justify-center !text-lg">alternate_email</mat-icon>
          </div>
        </div>

        <!-- Password Field -->
        <div class="space-y-2">
          <label class="font-heading text-[10px] text-balawi-bg uppercase tracking-widest">MOT DE PASSE</label>
          <div class="relative">
            <input type="password" formControlName="password" placeholder="••••••••"
                   class="w-full px-5 py-3.5 border-[3px] border-balawi-bg font-heading text-xs tracking-widest focus:bg-balawi-neon/10 outline-none transition-all placeholder:text-balawi-bg/20">
            <mat-icon class="absolute right-4 top-1/2 -translate-y-1/2 text-balawi-bg/20 !flex !items-center !justify-center !text-lg">lock</mat-icon>
          </div>
        </div>

        <!-- Actions -->
        <div class="flex items-center justify-between">
          <label class="flex items-center gap-2 cursor-pointer group">
            <div class="relative w-5 h-5 border-[3px] border-balawi-bg group-hover:bg-balawi-neon/20 transition-colors flex items-center justify-center">
              <input type="checkbox" formControlName="rememberMe" class="absolute inset-0 opacity-0 cursor-pointer z-10">
              <div *ngIf="loginForm.get('rememberMe')?.value" class="w-2.5 h-2.5 bg-balawi-neon border border-balawi-bg"></div>
            </div>
            <span class="font-heading text-[9px] text-balawi-bg uppercase tracking-widest">SE SOUVENIR</span>
          </label>
        </div>

        <!-- Submit -->
        <div class="pt-2">
          <button type="submit" [disabled]="loginForm.invalid || isLoading"
                  class="w-full py-4 bg-balawi-neon text-balawi-bg font-heading text-xl uppercase tracking-[0.2em] border-[3px] border-balawi-bg shadow-[8px_8px_0px_0px_#0B0B0B] hover:shadow-none hover:translate-x-[8px] hover:translate-y-[8px] transition-all flex items-center justify-center gap-3 disabled:opacity-50 italic">
            <span *ngIf="!isLoading">SE CONNECTER</span>
            <div *ngIf="isLoading" class="w-6 h-6 border-4 border-balawi-bg border-t-transparent rounded-full animate-spin"></div>
          </button>
        </div>

        <!-- Footer -->
        <p class="text-center pt-4">
          <a routerLink="/register" class="font-heading text-[10px] text-balawi-bg uppercase tracking-widest border-b-2 border-balawi-neon hover:bg-balawi-neon transition-all px-2 py-0.5 inline-block">CRÉER UN COMPTE</a>
        </p>
      </form>

    </div>
  </div>
</div>
