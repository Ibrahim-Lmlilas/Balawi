<div class="flex h-screen bg-balawi-white font-sans text-balawi-dark relative overflow-hidden">
  <!-- Sidebar Desktop (cachée sur mobile) -->
  <aside class="hidden md:flex w-64 bg-balawi-neon text-balawi-bg flex-col shrink-0 overflow-y-auto z-[20] border-r-4 border-balawi-bg">
    <div class="p-6 flex justify-center">
      <img src="/BALAWInobg.png" alt="BALAWI" class="h-16 object-contain">
    </div>

    <!-- Navigation List (Re-used) -->
    <ng-container *ngTemplateOutlet="navLinks"></ng-container>

    <div class="p-4 border-t-4 border-balawi-bg mt-auto">
      <button (click)="logout()"
        class="flex items-center gap-3 w-full px-4 py-3 rounded-none text-balawi-bg hover:bg-balawi-bg hover:text-balawi-neon transition-all group font-heading uppercase tracking-widest text-xs">
        <mat-icon class="group-hover:scale-110 transition-transform">logout</mat-icon>
        <span class="font-bold">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Overlay Mobile -->
  <div *ngIf="isMobileMenuOpen()" class="fixed inset-0 bg-black/80 z-[40] md:hidden backdrop-blur-sm transition-opacity" (click)="closeMobileMenu()">
  </div>

  <!-- Sidebar Mobile (Off-canvas) -->
  <aside 
    class="fixed inset-y-0 left-0 z-[50] w-64 bg-balawi-neon text-balawi-bg flex flex-col shadow-2xl transition-transform duration-300 ease-in-out transform md:hidden overflow-y-auto"
    [class.-translate-x-full]="!isMobileMenuOpen()"
    [class.translate-x-0]="isMobileMenuOpen()">
    <div class="p-6 flex items-center justify-center relative">
      <img src="/BALAWInobg.png" alt="BALAWI" class="h-14 object-contain">
      <button (click)="closeMobileMenu()" class="absolute right-4 text-balawi-bg hover:bg-balawi-bg/10 rounded-full p-1 transition-colors">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <ng-container *ngTemplateOutlet="navLinks"></ng-container>

    <div class="p-4 border-t-4 border-balawi-bg mt-auto">
      <button (click)="logout()"
        class="flex items-center gap-3 w-full px-4 py-3 rounded-none text-balawi-bg hover:bg-balawi-bg hover:text-balawi-neon transition-all group font-heading uppercase tracking-widest text-xs">
        <mat-icon class="group-hover:scale-110 transition-transform">logout</mat-icon>
        <span class="font-bold">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Liens de navigation (Template partagé) -->
  <ng-template #navLinks>
    <nav class="flex-1 mt-4 px-0 space-y-0">
      <a routerLink="/admin/dashboard" routerLinkActive="active-link" (click)="closeMobileMenu()"
        class="nav-link group">
        <mat-icon class="group-hover:rotate-12 transition-transform">dashboard</mat-icon>
        <span class="text-sm">Dashboard</span>
      </a>
      <a routerLink="/admin/users" routerLinkActive="active-link" (click)="closeMobileMenu()"
        class="nav-link group">
        <mat-icon class="group-hover:rotate-12 transition-transform">people</mat-icon>
        <span class="text-sm">Users</span>
      </a>
      <a routerLink="/admin/items" routerLinkActive="active-link" (click)="closeMobileMenu()"
        class="nav-link group">
        <mat-icon class="group-hover:rotate-12 transition-transform">inventory_2</mat-icon>
        <span class="text-sm">Articles</span>
      </a>
      <a routerLink="/admin/comments" routerLinkActive="active-link" (click)="closeMobileMenu()"
        class="nav-link group">
        <mat-icon class="group-hover:rotate-12 transition-transform">comment</mat-icon>
        <span class="text-sm">Comments</span>
      </a>
      <a routerLink="/admin/categories" routerLinkActive="active-link" (click)="closeMobileMenu()"
        class="nav-link group">
        <mat-icon class="group-hover:rotate-12 transition-transform">category</mat-icon>
        <span class="text-sm">Catégories</span>
      </a>
      <a routerLink="/admin/orders" routerLinkActive="active-link" (click)="closeMobileMenu()"
        class="nav-link group">
        <mat-icon class="group-hover:rotate-12 transition-transform">shopping_cart</mat-icon>
        <span class="text-sm">Orders</span>
      </a>
    </nav>
  </ng-template>

  <!-- Main Content - FIXED FOR MODALS -->
  <main class="flex-1 flex flex-col min-w-0 bg-balawi-white relative">
    <!-- Topbar -->
    <header class="h-16 bg-balawi-white border-b-4 border-balawi-bg flex items-center justify-between px-4 md:px-8 shrink-0 z-[10]">
      <div class="flex items-center gap-3">
        <button (click)="toggleMobileMenu()"
          class="md:hidden p-2 text-balawi-dark hover:bg-balawi-neon rounded-none border-2 border-balawi-bg transition-colors">
          <mat-icon>menu</mat-icon>
        </button>
        <h2 class="text-xl font-heading text-balawi-bg hidden sm:block uppercase tracking-wide">Administration</h2>
        <h2 class="text-lg font-heading text-balawi-bg sm:hidden uppercase tracking-wide">Admin</h2>
      </div>

      <div class="flex items-center gap-4" *ngIf="currentUser$ | async as user">
        <div class="text-right hidden sm:block">
          <p class="text-xs font-heading text-balawi-bg uppercase">{{ user.firstName }} {{ user.lastName }}</p>
          <p class="text-[8px] text-balawi-bg/60 font-slogan tracking-widest font-bold uppercase">SuperAdmin</p>
        </div>
        <div
          class="w-10 h-10 rounded-none border-4 border-balawi-bg overflow-hidden bg-balawi-neon flex items-center justify-center transition-transform hover:rotate-6">
          <img *ngIf="authService.hasPhoto(user.profilePhotoUrl); else adminDefaultAvatar" [src]="authService.toAbsoluteUrl(user.profilePhotoUrl)"
            class="w-full h-full object-cover" [alt]="user.firstName">
          <ng-template #adminDefaultAvatar>
            <img src="/images/default-avatar.png" class="w-full h-full object-cover">
          </ng-template>
        </div>
      </div>
    </header>

    <!-- Content Area -->
    <div class="flex-1 overflow-y-auto p-4 md:p-8 bg-balawi-white custom-scrollbar">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
